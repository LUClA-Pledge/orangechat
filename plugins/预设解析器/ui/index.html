<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>预设解析器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf8f5;--card:#fff;--bd:#e0dbd5;--t1:#2c2420;--t2:#8a7e74;--t3:#b5a99a;--ac:#c4713b;--ac2:#e8945a;--ok:#6b8e5a;--er:#c45c4a;--shadow:0 1px 3px rgba(0,0,0,.06)}
body{font-family:Georgia,'Noto Serif SC',serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* Header */
.hd{padding:24px 20px 16px;border-bottom:1px solid var(--bd)}
.hd h1{font-size:22px;font-weight:700;letter-spacing:.5px}
.hd p{font-size:13px;color:var(--t2);margin-top:4px;font-style:italic}

/* Upload */
.up{margin:20px;padding:48px 20px;border:1px dashed var(--bd);border-radius:2px;text-align:center;cursor:pointer;transition:all .2s;background:var(--card)}
.up:active{background:#f0ece7}
.up .ic{font-size:36px;margin-bottom:12px;display:block}
.up .t2{font-size:15px;color:var(--t2)}
.up .t3{font-size:12px;color:var(--t3);margin-top:4px}

/* File Info */
.fi{margin:0 20px 12px;padding:12px 16px;background:var(--card);border:1px solid var(--bd);border-radius:2px;display:none;align-items:center;gap:10px;box-shadow:var(--shadow)}
.fi.sh{display:flex}
.fi .fn{flex:1;font-size:14px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi .fm{font-size:11px;color:var(--t2);margin-top:2px}
.fi .rx{background:none;border:1px solid var(--bd);color:var(--t2);font-size:13px;cursor:pointer;padding:4px 12px;border-radius:2px;font-family:inherit}
.fi .rx:active{background:#f0ece7}

/* Stats */
.st{margin:0 20px 12px;display:none;flex-wrap:wrap;gap:6px}
.st.sh{display:flex}
.st span{font-size:12px;color:var(--t2);background:var(--card);border:1px solid var(--bd);padding:3px 10px;border-radius:2px}
.st b{color:var(--ac);font-weight:600}

/* Filter chips (dynamically created) */
.fc{display:inline-block;background:var(--card);border:1px solid var(--bd);color:var(--t2);font-size:11px;padding:4px 10px;border-radius:2px;cursor:pointer;font-family:-apple-system,sans-serif;letter-spacing:.3px;transition:all .15s;-webkit-user-select:none}
.fc:active{background:#f0ece7}
.fc.ac{background:var(--ac);color:#fff;border-color:var(--ac)}

/* Search */
.sb{margin:0 20px 8px;display:none;position:relative}
.sb.sh{display:block}
.sb input{width:100%;padding:10px 12px;background:var(--card);border:1px solid var(--bd);border-radius:2px;color:var(--t1);font-size:14px;font-family:inherit;outline:none}
.sb input:focus{border-color:var(--ac)}

/* Toolbar */
.tb{margin:4px 20px 16px;display:none;align-items:center;gap:6px;flex-wrap:wrap}
.tb.sh{display:flex}
.tb .sc{font-size:13px;color:var(--t2);flex:1;font-style:italic}
.tb button{background:var(--card);border:1px solid var(--bd);color:var(--t2);font-size:12px;cursor:pointer;padding:6px 12px;border-radius:2px;font-family:inherit;transition:all .15s}
.tb button:active{background:#f0ece7}
.tb button.bp{background:var(--ac);color:#fff;border-color:var(--ac)}
.tb button.bp:disabled{opacity:.4;cursor:default}

/* Entry List */
.el{margin:0 20px;display:flex;flex-direction:column;gap:8px;padding-bottom:40px}

/* Entry Card */
.ec{background:var(--card);border:1px solid var(--bd);border-radius:2px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s}
.ec.sl{border-color:var(--ac);border-width:2px}

.eh{padding:14px 16px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;-webkit-user-select:none}

/* Checkbox */
.ck{flex-shrink:0;width:18px;height:18px;border:1.5px solid var(--bd);border-radius:1px;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:11px;color:transparent;transition:all .15s;background:var(--card)}
.ec.sl .ck{background:var(--ac);border-color:var(--ac);color:#fff}

.ei{flex:1;min-width:0}
.en{font-size:14px;font-weight:600;line-height:1.4;word-break:break-word;margin-bottom:4px}
.ed{font-size:13px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-style:italic}

/* Tags */
.tg-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tg{padding:2px 6px;font-size:10px;border-radius:1px;font-family:-apple-system,sans-serif;font-weight:500;letter-spacing:.3px}
.tg-r{background:#f0e6dc;color:#9a6840}
.tg-p{background:#e8e0d4;color:#7a6a58}
.tg-d{background:#e4ebe0;color:#5a7a4a}
.tg-m{background:#ece8e4;color:#8a8078}
.tg-ok{background:#e4ebe0;color:#5a7a4a}
.tg-no{background:#f0e4e0;color:#9a5a4a}
.tg-s{background:#e8e0ec;color:#7a5a8a}
.tg-i{background:#e0e4ec;color:#4a5a7a}

/* Expand */
.ex-btn{background:none;border:none;border-top:1px solid var(--bd);color:var(--t3);font-size:11px;cursor:pointer;padding:8px;width:100%;text-align:center;font-family:inherit}
.ex-btn:active{color:var(--ac)}

/* Content */
.cv{display:none;font-size:13px;color:var(--t2);line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:280px;overflow-y:auto;background:#f8f6f3;margin:0 12px 12px;border-radius:2px;padding:12px;border:1px solid var(--bd)}
.cv.sh{display:block}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--t3);font-style:italic;font-size:14px}

/* Detail Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.sh{display:flex}
.mo-c{background:var(--bg);border-radius:4px 4px 0 0;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:border-box;flex-direction:column}
.mo-h{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mo-h h2{font-size:16px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mo-x{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer;padding:4px 8px;font-family:inherit}
.mo-b{flex:1;overflow-y:auto;padding:20px}
.mo-b .f{margin-bottom:16px}
.mo-b .fl{font-size:11px;color:var(--t3);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:-apple-system,sans-serif}
.mo-b .fv{font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word;background:var(--card);padding:12px;border:1px solid var(--bd);border-radius:2px;max-height:350px;overflow-y:auto}
.mo-ft{padding:12px 20px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.mo-ft button{padding:8px 20px;border:1px solid var(--bd);border-radius:2px;font-family:inherit;font-size:13px;cursor:pointer;background:var(--card);color:var(--t2)}
.mo-ft button.bp{background:var(--ac);color:#fff;border-color:var(--ac)}
.mo-ft button.bo{background:var(--ok);color:#fff;border-color:var(--ok)}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:2px;font-size:13px;color:#fff;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;font-family:-apple-system,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.toast.sh{opacity:1}
.toast-ok{background:var(--ok)}.toast-er{background:var(--er)}.toast-info{background:#666}
</style>
</head>
<body>

<div class="hd">
  <h1>Oraculum</h1>
  <p>Decipher presets, cherry-pick what you need.</p>
</div>

<div class="up" id="upArea" onclick="pickFile()">
  <span class="ic">⚝</span>
  <div class="t2">Select a preset file</div>
  <div class="t3">SillyTavern JSON · Mode Injection JSON · TXT · MD</div>
</div>

<div class="fi" id="fInfo">
  <div style="flex:1;min-width:0">
    <div class="fn" id="fName"></div>
    <div class="fm" id="fMeta"></div>
  </div>
  <button class="rx" onclick="resetAll()">Reset</button>
</div>

<div class="st" id="statsRow"></div>
<div class="sb" id="searchBox">
  <input id="searchIn" placeholder="Search name or content..." oninput="onSearch(this.value)">
</div>
<div class="tb" id="toolbar">
  <span class="sc" id="selCount"></span>
  <button onclick="selectAll()">All</button>
  <button onclick="selectNone()">None</button>
  <button onclick="selectInv()">Invert</button>
  <button onclick="selectContent()">Content</button>
  <button class="bp" id="btnExport" disabled onclick="doExport()">Export</button>
</div>

<div class="el" id="entryList"></div>
<div class="toast" id="toast"></div>

<div class="mo" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="mo-c">
    <div class="mo-h">
      <h2 id="modalTitle"></h2>
      <button class="mo-x" onclick="closeModal()">×</button>
    </div>
    <div class="mo-b" id="modalBody"></div>
    <div class="mo-ft">
      <button class="bp" id="modalToggle" onclick="modalToggleSelect()">Select</button>
      <button class="bo" onclick="modalExport()">Export This</button>
    </div>
  </div>
</div>

<script>
var E=[],S=new Set(),F='all',Q='',FN='',MI=-1;

function $(id){return document.getElementById(id)}
function esc(s){var d=document.createElement('div');d.textContent=String(s==null?'':s);return d.innerHTML}

function toast(m,t){
  var e=$('toast');e.textContent=m;
  e.className='toast sh toast-'+(t||'info');
  clearTimeout(e._t);e._t=setTimeout(function(){e.className='toast'},2400);
}

function uuid(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
    var r=Math.random()*16|0;return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}

// ===== File Pick via Bridge =====
function pickFile(){
  if(window.Bridge && Bridge.pickBinaryFile){
    Bridge.pickBinaryFile().then(function(r){
      if(r && r.success){
        FN=r.fileName||'unknown.json';
        // Decode base64 to text
        try{
          var text=decodeURIComponent(escape(atob(r.base64)));
          parse(text,FN);
        }catch(e){
          try{var text=atob(r.base64);parse(text,FN)}
          catch(e2){toast('Decode failed: '+e2.message,'er')}
        }
      }else{
        toast(r&&r.error||'Cancelled','er');
      }
    });
  }else if(window.Bridge && Bridge.pickFile){
    Bridge.pickFile().then(function(r){
      if(r && r.success){
        FN=r.fileName||'unknown.json';
        parse(r.content,FN);
      }else{
        toast(r&&r.error||'Cancelled','er');
      }
    });
  }else{
    // Fallback for browser testing
    var inp=document.createElement('input');
    inp.type='file';inp.accept='.json,.txt,.md';
    inp.onchange=function(){
      if(!this.files.length)return;
      var f=this.files[0];FN=f.name;
      var r=new FileReader();
      r.onload=function(e){parse(e.target.result,FN)};
      r.readAsText(f);
    };
    inp.click();
  }
}

function resetAll(){
  E=[];S.clear();F='all';Q='';FN='';MI=-1;
  $('fInfo').classList.remove('sh');
  $('statsRow').classList.remove('sh');$('statsRow').innerHTML='';
  $('searchBox').classList.remove('sh');$('searchIn').value='';
  $('toolbar').classList.remove('sh');
  $('entryList').innerHTML='';
  $('upArea').style.display='';
  closeModal();
}

// ===== Parsing =====
function parse(text,name){
  var result=null;
  try{var j=JSON.parse(text);if(j.prompts&&Array.isArray(j.prompts))result=parseST(j,name)}catch(e){}
  if(!result)try{var j=JSON.parse(text);if(j.type==='mode_injection'&&j.data)result=[parseNative(j.data,name)]}catch(e){}
  if(!result)try{var j=JSON.parse(text);if(j.name!==undefined&&j.content!==undefined&&j.content&&j.content.trim())result=[parseNative(j,name)]}catch(e){}
  if(!result&&text.trim()){
    result=[{name:name.replace(/\.(json|txt|md)$/i,'')||'Import',content:text.trim(),role:'user',position:'after_system_prompt',injectDepth:4,enabled:true,marker:false,system_prompt:false,identifier:'',_source:'plain'}];
  }
  if(!result||!result.length){toast('Cannot parse this file','er');return}
  E=result;S.clear();
  $('upArea').style.display='none';
  $('fName').textContent=name;
  $('fMeta').textContent=E.length+' entries';
  $('fInfo').classList.add('sh');
  showStats();showFilters();showToolbar();
  $('searchBox').classList.add('sh');
  render();
  toast(E.length+' entries parsed','ok');
}

function parseST(j,name){
  var pm={0:'after_system_prompt',1:'after_system_prompt',2:'after_system_prompt',3:'top_of_chat',4:'bottom_of_chat',5:'at_depth'};
  var pl={'after_system_prompt':'After System','before_system_prompt':'Before System','top_of_chat':'Chat Top','bottom_of_chat':'Chat Bottom','at_depth':'At Depth'};
  return j.prompts.map(function(p,i){
    var pos=pm[p.injection_position||0]||'after_system_prompt';
    return{name:p.name||p.identifier||('Entry '+(i+1)),content:p.content||'',role:p.role||'system',identifier:p.identifier||'',system_prompt:!!p.system_prompt,marker:!!p.marker,injection_position:p.injection_position||0,injection_depth:p.injection_depth||4,enabled:p.enabled!==false,position:pos,positionLabel:pl[pos]||pos,injectDepth:p.injection_depth||4,_source:'sillytavern'};
  });
}

function parseNative(d,name){
  var pl={'before_system_prompt':'Before System','after_system_prompt':'After System','top_of_chat':'Chat Top','bottom_of_chat':'Chat Bottom','at_depth':'At Depth'};
  return{name:d.name||name||'Mode Injection',content:d.content||'',role:d.role||'user',position:d.position||'after_system_prompt',positionLabel:pl[d.position]||d.position||'After System',injectDepth:d.injectDepth||4,enabled:d.enabled!==false,priority:d.priority||0,marker:false,system_prompt:false,identifier:'',_source:'native'};
}

// ===== UI =====
function showStats(){
  var total=E.length,hasC=0,markers=0;
  E.forEach(function(e){if(e.content&&e.content.trim())hasC++;if(e.marker)markers++});
  var h='<span><b>'+total+'</b> total</span><span><b>'+hasC+'</b> with content</span>';
  if(markers)h+='<span><b>'+markers+'</b> markers</span>';
  $('statsRow').innerHTML=h;$('statsRow').classList.add('sh');
}

function showFilters(){
  var roles=new Set();
  E.forEach(function(e){if(e.role)roles.add(e.role)});
  var h='';
  h+='<span class="fc'+(F==='all'?' ac':'')+'" data-f="all" onclick="setFilter(\'all\',this)">All</span>';
  h+='<span class="fc'+(F==='has-content'?' ac':'')+'" data-f="has-content" onclick="setFilter(\'has-content\',this)">Has Content</span>';
  h+='<span class="fc'+(F==='non-marker'?' ac':'')+'" data-f="non-marker" onclick="setFilter(\'non-marker\',this)">Non-Marker</span>';
  roles.forEach(function(r){
    h+='<span class="fc'+(F==='role:'+r?' ac':'')+'" data-f="role:'+r+'" onclick="setFilter(\'role:'+r+'\',this)">'+r+'</span>';
  });
  // Insert filter bar before toolbar
  var fb=document.getElementById('filterBar');
  if(!fb){
    fb=document.createElement('div');fb.id='filterBar';
    fb.style.cssText='margin:8px 20px 4px;display:flex;gap:6px;flex-wrap:wrap';
    $('toolbar').parentNode.insertBefore(fb,$('toolbar'));
  }
  fb.innerHTML=h;fb.style.display='flex';
}

function setFilter(f){
  F=f;showFilters();render();
}

function showToolbar(){$('toolbar').classList.add('sh');updateUI()}

function onSearch(v){Q=v.toLowerCase();render()}

function filt(){
  var r=[];
  E.forEach(function(e,i){
    var mf=true;
    switch(F){
      case'all':break;case'has-content':mf=!!(e.content&&e.content.trim());break;
      case'no-content':mf=!(e.content&&e.content.trim());break;case'non-marker':mf=!e.marker;break;
      default:if(F.startsWith('role:'))mf=e.role===F.slice(5);
    }
    var ms=!Q||((e.name&&e.name.toLowerCase().indexOf(Q)>=0)||(e.content&&e.content.toLowerCase().indexOf(Q)>=0)||(e.identifier&&e.identifier.toLowerCase().indexOf(Q)>=0));
    if(mf&&ms)r.push(i);
  });
  return r;
}

function selectAll(){filt().forEach(function(i){S.add(i)});updateUI();render()}
function selectNone(){filt().forEach(function(i){S.delete(i)});updateUI();render()}
function selectInv(){filt().forEach(function(i){S.has(i)?S.delete(i):S.add(i)});updateUI();render()}
function selectContent(){filt().forEach(function(i){if(E[i].content&&E[i].content.trim())S.add(i)});updateUI();render()}

function updateUI(){
  $('selCount').textContent=S.size+' selected';
  $('btnExport').disabled=S.size===0;
}

// ===== Render =====
function render(){
  var list=$('entryList'),h='';
  E.forEach(function(e,i){
    var ok=filt();if(ok.indexOf(i)<0)return;
    var sel=S.has(i),hasC=!!(e.content&&e.content.trim());
    h+='<div class="ec'+(sel?' sl':'')+'" data-i="'+i+'" onclick="toggleSel('+i+',this)">';
    h+='<div class="eh">';
    h+='<div class="ck">'+(sel?'✓':'')+'</div>';
    h+='<div class="ei">';
    h+='<div class="en">'+esc(e.name)+'</div>';
    if(hasC){
      h+='<div class="ed">'+esc(e.content.substring(0,200))+(e.content.length>200?'…':'')+'</div>';
    }else{
      h+='<div class="ed" style="color:var(--t3)">— empty'+(e.marker?' (marker)':'')+' —</div>';
    }
    h+='<div class="tg-row">';
    h+='<span class="tg tg-r">'+esc(e.role||'?')+'</span>';
    h+='<span class="tg tg-p">'+esc(e.positionLabel||e.position||'?')+'</span>';
    if(e.position==='at_depth')h+='<span class="tg tg-d">depth '+(e.injectDepth||4)+'</span>';
    if(e.marker)h+='<span class="tg tg-m">marker</span>';
    if(e.system_prompt)h+='<span class="tg tg-s">system</span>';
    h+='<span class="tg '+(e.enabled?'tg-ok':'tg-no')+'">'+(e.enabled?'on':'off')+'</span>';
    h+='</div></div></div>';
    if(hasC){
      h+='<button class="ex-btn" onclick="event.stopPropagation();toggleExp('+i+',this)">expand ▾</button>';
      h+='<div class="cv" id="cv'+i+'">'+esc(e.content)+'</div>';
    }
    h+='</div>';
  });
  if(!h)h='<div class="empty">'+(E.length?'No matching entries':'No entries')+'</div>';
  list.innerHTML=h;
  updateUI();
}

function toggleSel(i,card){
  if(S.has(i))S.delete(i);else S.add(i);
  card.classList.toggle('sl');
  card.querySelector('.ck').textContent=S.has(i)?'✓':'';
  updateUI();
}

function toggleExp(i,btn){
  var v=$('cv'+i);if(!v)return;
  v.classList.toggle('sh');
  btn.textContent=v.classList.contains('sh')?'collapse ▴':'expand ▾';
}

// Long press for detail
document.addEventListener('contextmenu',function(ev){
  var card=ev.target.closest('.ec');if(!card)return;
  ev.preventDefault();
  var idx=parseInt(card.dataset.i);openModal(idx);
});

// ===== Modal =====
function openModal(idx){
  if(idx<0||idx>=E.length)return;MI=idx;
  var e=E[idx];
  $('modalTitle').textContent=e.name||'Untitled';
  var b='';
  b+='<div class="f"><div class="fl">Name</div><div class="fv">'+esc(e.name||'—')+'</div></div>';
  if(e.identifier)b+='<div class="f"><div class="fl">Identifier</div><div class="fv" style="font-family:monospace;font-size:12px">'+esc(e.identifier)+'</div></div>';
  b+='<div class="f"><div class="fl">Properties</div><div class="tg-row" style="gap:6px">';
  b+='<span class="tg tg-r">'+esc(e.role||'?')+'</span>';
  b+='<span class="tg tg-p">'+esc(e.positionLabel||e.position||'?')+'</span>';
  if(e.position==='at_depth')b+='<span class="tg tg-d">depth '+(e.injectDepth||4)+'</span>';
  if(e.marker)b+='<span class="tg tg-m">marker</span>';
  if(e.system_prompt)b+='<span class="tg tg-s">system</span>';
  b+='<span class="tg '+(e.enabled?'tg-ok':'tg-no')+'">'+(e.enabled?'enabled':'disabled')+'</span>';
  if(e.priority)b+='<span class="tg tg-i">priority '+e.priority+'</span>';
  b+='</div></div>';
  if(e.content){
    b+='<div class="f"><div class="fl">Content ('+e.content.length+' chars)</div><div class="fv">'+esc(e.content)+'</div></div>';
  }else{
    b+='<div class="f"><div class="fl">Content</div><div class="fv" style="color:var(--t3);font-style:italic">— empty —</div></div>';
  }
  $('modalBody').innerHTML=b;
  updateModalToggle();
  $('modalBg').classList.add('sh');
}

function closeModal(){$('modalBg').classList.remove('sh');MI=-1}

function updateModalToggle(){
  if(MI<0)return;
  var b=$('modalToggle');
  if(S.has(MI)){b.textContent='Deselect';b.className='bp'}else{b.textContent='Select';b.className='bp'}
}

function modalToggleSelect(){
  if(MI<0)return;
  if(S.has(MI))S.delete(MI);else S.add(MI);
  updateUI();updateModalToggle();render();
}

function modalExport(){
  if(MI<0)return;
  if(!S.has(MI)){S.add(MI);updateUI()}
  exportOne(MI);
}

// ===== Export =====
function exportRole(r){return r==='assistant'?'assistant':'user'}

function exportOne(idx){
  var e=E[idx];
  if(!e.content||!e.content.trim()){toast('No content to export','er');return}
  var item={id:uuid(),name:e.name||'mode_injection',enabled:true,priority:e.priority||0,position:e.position||'after_system_prompt',content:e.content.trim(),injectDepth:e.injectDepth||e.injection_depth||4,role:exportRole(e.role)};
  var json=JSON.stringify({version:1,type:'mode_injection',data:item},null,2);
  saveFile(item.name+'.json',json);
}

function doExport(){
  if(!S.size){toast('Select entries first','er');return}
  var items=[];
  S.forEach(function(i){
    var e=E[i];if(!e.content||!e.content.trim())return;
    items.push({id:uuid(),name:e.name||'mode_injection',enabled:true,priority:e.priority||0,position:e.position||'after_system_prompt',content:e.content.trim(),injectDepth:e.injectDepth||e.injection_depth||4,role:exportRole(e.role)});
  });
  if(!items.length){toast('Selected entries have no content','er');return}
  if(items.length===1){
    saveFile(items[0].name+'.json',JSON.stringify({version:1,type:'mode_injection',data:items[0]},null,2));
  }else{
    // Export multiple as batch
    items.forEach(function(item,i){
      setTimeout(function(){
        saveFile(item.name+'.json',JSON.stringify({version:1,type:'mode_injection',data:item},null,2));
      },i*300);
    });
  }
  toast(items.length+' file(s) exported','ok');
}

function saveFile(name,content){
  if(window.Bridge && Bridge.saveFileAs){
    // Use Bridge API for Android WebView
    var b64=btoa(unescape(encodeURIComponent(content)));
    Bridge.saveFileAs(name,b64);
  }else{
    // Fallback for browser
    var blob=new Blob([content],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download=name;a.click();
    setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
  }
}
</script>
